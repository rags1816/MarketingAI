    /* CSS Variables & Theme Setup */
    :root {

    * {

      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'IBM Plex Sans', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;

      color: var(--ink);
      overflow: hidden;
      height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* Scrollbars */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    ::-webkit-scrollbar-thumb {
      background: #CBD5E1;
      border-radius: 3px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #94A3B8;
    }

    /* Common Utilities */
    .font-display { font-family: 'Space Grotesk', sans-serif; }
    .font-mono { font-family: 'IBM Plex Mono', monospace; }
    
    .shadow-premium {
      box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05), 0 2px 4px -2px rgb(0 0 0 / 0.05), 0 0 0 1px rgb(0 0 0 / 0.02);
    }
    .shadow-modal {
      box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1), 0 0 0 1px rgb(0 0 0 / 0.05);
    }

    /* Inputs & UI elements */
    input, select, textarea {
      width: 100%;
      padding: 9px 12px;
      font-size: 14px;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: var(--panel);
      color: var(--ink);
      font-family: inherit;
      transition: all 0.15s ease;
    }
    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: var(--cobalt);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
    }

    /* Grid Widgets */
    .pestle-grid, .swot-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
    }
    @media (max-width: 768px) {
      .pestle-grid, .swot-grid {
        grid-template-columns: 1fr;
      }
    }

    /* Interactive Grids */
    .bcg-box {
      border: 1px solid var(--border);
      aspect-ratio: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s ease;
      background: var(--panel);
      padding: 12px;
      position: relative;
    }
    .bcg-box:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 16px -4px rgba(0,0,0,0.08);
    }

    /* Animations */
    .fade-in {
      animation: fadeIn 0.2s ease-out;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(4px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Pin pad buttons */
    .pin-btn {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: var(--panel);
      font-size: 20px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.1s ease;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .pin-btn:hover {
      background: var(--cobalt-soft);
      border-color: var(--cobalt);
      color: var(--cobalt);
    }
    .pin-btn:active {
      transform: scale(0.95);
    }
    @keyframes pulse-glowing {
      0% {
        box-shadow: 0 0 0 0 rgba(37, 99, 235, 0.6);
      }
      70% {
        box-shadow: 0 0 0 12px rgba(37, 99, 235, 0);
      }
      100% {
        box-shadow: 0 0 0 0 rgba(37, 99, 235, 0);
      }
    }
    .pulse-glow {
      animation: pulse-glowing 2s infinite;
    }

    /* ================= MINIMAL MARKDOWN RENDERER ================= */
    function inlineMd(text) {
      if (!text) return "";
      const parts = [];
      let rest = text, key = 0;
      const re = /\*\*(.+?)\*\*/;
      while (rest.length) {
        const m = rest.match(re);
        if (!m) { parts.push(rest); break; }
        if (m.index > 0) parts.push(rest.slice(0, m.index));
        parts.push(<strong key={key++} style={{ fontWeight: 700 }}>{m[1]}</strong>);
        rest = rest.slice(m.index + m[0].length);
      }
      return parts;
    }

    function Markdown({ text, compact }) {
      if (!text) return null;
      const lines = text.split("\n");
      const out = [];
      let listBuf = [];
      
      const flushList = () => {
        if (listBuf.length) {
          out.push(
            <ul key={"ul" + out.length} style={{ margin: "8px 0 12px", paddingLeft: "24px" }}>
              {listBuf.map((li, i) => (
                <li key={i} style={{ margin: "4px 0", lineHeight: 1.5, fontSize: compact ? '13px' : '14.5px' }}>
                  {inlineMd(li)}
                </li>
              ))}
            </ul>
          );
          listBuf = [];
        }
      };

      lines.forEach((raw, i) => {
        const line = raw.trimEnd();
        if (/^\s*[-*]\s+/.test(line)) {
          listBuf.push(line.replace(/^\s*[-*]\s+/, ""));
          return;
        }
        flushList();
        
        if (!line.trim()) return;
        
        if (line.startsWith("### ")) {
          out.push(<h4 key={i} className="font-display" style={{ margin: "16px 0 6px", fontSize: compact ? '14px' : '16px', fontWeight: 600 }}>{line.slice(4)}</h4>);
        } else if (line.startsWith("## ")) {
          out.push(
            <h3 key={i} className="font-display" style={{ margin: "24px 0 8px", fontSize: compact ? '16px' : '18px', fontWeight: 700, paddingBottom: "6px", borderBottom: `1px solid var(--border)` }}>
              {line.slice(3)}
            </h3>
          );
        } else if (line.startsWith("# ")) {
          out.push(<h2 key={i} className="font-display" style={{ margin: "28px 0 10px", fontSize: compact ? '18px' : '22px', fontWeight: 700 }}>{line.slice(2)}</h2>);
        } else if (line.startsWith("|")) {
          out.push(
            <div key={i} className="font-mono" style={{ fontSize: '12px', whiteSpace: "pre", overflowX: "auto", background: "#F1F5F9", padding: "6px 12px", borderRadius: "4px", margin: "6px 0" }}>
              {line}
            </div>
          );
        } else if (line.startsWith("> ")) {
          out.push(
            <blockquote key={i} style={{ margin: "8px 0", padding: "8px 12px", borderLeft: `4px solid var(--amber)`, background: "var(--amber-soft)", borderRadius: "0 4px 4px 0", lineHeight: 1.6, fontSize: compact ? '12.5px' : '13.5px' }}>
              {inlineMd(line.slice(2))}
            </blockquote>
          );
        } else {
          out.push(<p key={i} style={{ margin: "6px 0 8px", lineHeight: 1.6, fontSize: compact ? '13px' : '14.5px' }}>{inlineMd(line)}</p>);
        }
      });
      flushList();
      return <div className="markdown-body">{out}</div>;
    }

          setCurrentUser(found);
          setLoginError("");
          setLoginPasscode("");
        } else {
          setLoginError("Incorrect Admin passcode.");
          setLoginPasscode("");
        }
      };

      const handleLogout = () => {
        setCurrentUser(null);
        setAuditMode(false);
        setAuditTargetUserId(null);
        setAuditTargetProjectId(null);
        setActiveModule("home");
      };

      // Project Handlers
      const createNewProject = (name) => {
        if (!name.trim()) return;
        const newProj = {
          id: "proj-" + Date.now(),
          userId: auditMode ? auditTargetUserId : currentUser.id,
          name: name.trim(),
          intake: {},
          moduleDrafts: {},
          gateDecisions: {},
          widgetStates: {
            tam_calculator: { tamAccts: 1000, samAccts: 500, somAccts: 100, acvVal: 5000 },
            porter_slider: { supplier: 3, buyer: 3, substitutes: 3, entrants: 3, rivalry: 3 },
            pestle_grid: { political: [], economic: [], social: [], tech: [], env: [], legal: [] },
            swot_grid: { strengths: [], weaknesses: [], opportunities: [], threats: [] }
          }
        };
        setProjects([...projects, newProj]);
        if (!auditMode) {
          setActiveProjectId(newProj.id);
          localStorage.setItem("marketai_last_project", newProj.id);
        } else {
          setAuditTargetProjectId(newProj.id);
        }
      };

      const deleteProject = (id) => {
        const remains = projects.filter(p => p.id !== id);
        setProjects(remains);
        if (activeProjectId === id) {
          const first = remains.find(p => p.userId === (auditMode ? auditTargetUserId : currentUser.id));
          setActiveProjectId(first ? first.id : "");
        }
      };

      // Module State Updators
      const updateProjectIntake = (key, val) => {
        setProjects(prev => prev.map(p => {
          if (p.id === activeProject.id) {
            return { ...p, intake: { ...p.intake, [key]: val } };
          }
          return p;
        }));
      };

      const updateModuleDraft = (moduleId, textVal) => {
        setProjects(prev => prev.map(p => {
          if (p.id === activeProject.id) {
            return { ...p, moduleDrafts: { ...p.moduleDrafts, [moduleId]: textVal } };
          }
          return p;
        }));
      };

      const updateGateDecision = (gateId, passed, note) => {
        setProjects(prev => prev.map(p => {
          if (p.id === activeProject.id) {
            const gates = { ...p.gateDecisions, [gateId]: { passed, note } };
            return { ...p, gateDecisions: gates };
          }
          return p;
        }));
      };

      const updateWidgetState = (widgetKey, stateObj) => {
        setProjects(prev => prev.map(p => {
          if (p.id === activeProject.id) {
            const widgets = { ...p.widgetStates, [widgetKey]: stateObj };
            return { ...p, widgetStates: widgets };
          }
          return p;
        }));
      };

      // Admin Account Control functions
      const adminAddUser = (name, pinStr) => {
        if (users.some(u => u.pin === pinStr)) return notify("PIN already in use!");
        const newUserObj = {
          id: "usr-" + Date.now(),
          name,
          role: "user",
          pin: pinStr,
          passcode: "",
          active: true
        };
        setUsers([...users, newUserObj]);
      };

      const adminToggleUserActive = (userId) => {
        setUsers(prev => prev.map(u => {
          if (u.id === userId && u.role !== "admin") {
            return { ...u, active: !u.active };
          }
          return u;
        }));
      };

      const adminDeleteUser = (userId) => {
        setUsers(prev => prev.filter(u => u.id !== userId));
        setProjects(prev => prev.filter(p => p.userId !== userId));
      };

      const adminChangePasscode = (newPass) => {
        setUsers(prev => prev.map(u => {
          if (u.role === "admin") return { ...u, passcode: newPass };
          return u;
        }));
      };

      /* ================= VIEW ROUTING ================= */
      if (!currentUser) {
        return (
          <AuthScreen
            loginMode={loginMode}
            setLoginMode={setLoginMode}
            loginPin={loginPin}
            setLoginPin={setLoginPin}
            loginPasscode={loginPasscode}
            setLoginPasscode={setLoginPasscode}
            showPasscodeText={showPasscodeText}
            setShowPasscodeText={setShowPasscodeText}
            loginError={loginError}
            setLoginError={setLoginError}
            onUserPinLogin={handleUserPinLogin}
            onAdminLogin={handleAdminPasscodeLogin}
          />
        );
      }

      if (currentUser.role === "admin" && !auditMode) {
        return (
          <AdminDashboard
            users={users}
            projects={projects}
            settings={settings}
            setSettings={setSettings}
            onAddUser={adminAddUser}
            onToggleUserActive={adminToggleUserActive}
            onDeleteUser={adminDeleteUser}
            onChangeAdminPasscode={adminChangePasscode}
            onLogout={handleLogout}
            onSwitchToConsultant={() => {
              const defaultUser = users.find(u => u.id === "user1") || users[1];
              setCurrentUser(defaultUser);
              setAuditMode(false);
              setActiveModule("home");
            }}
            onAuditProject={(userId, projId, modId = "home") => {
              setAuditTargetUserId(userId);
              setAuditTargetProjectId(projId);
              setAuditMode(true);
              setActiveModule(modId);
            }}
          />
        );
      }

      // User Workspace (or Admin Auditing User workspace)
      return (
        <div style={{ position: 'relative', width: '100vw', height: '100vh', overflow: 'hidden' }}>
          <UserWorkspace
            currentUser={currentUser}
            activeModule={activeModule}
            setActiveModule={setActiveModule}
            activeProject={activeProject}
            userProjects={projects.filter(p => (demoMode && p.id === "healthcare-demo") || p.userId === (auditMode ? auditTargetUserId : currentUser.id))}
            collapsedGroups={collapsedGroups}
            setCollapsedGroups={setCollapsedGroups}
            onCreateProject={createNewProject}
            onDeleteProject={deleteProject}
            onSelectProject={(id) => {
              if (auditMode) setAuditTargetProjectId(id);
              else {
                setActiveProjectId(id);
                localStorage.setItem("marketai_last_project", id);
              }
            }}
            updateProjectIntake={updateProjectIntake}
            updateModuleDraft={updateModuleDraft}
            updateGateDecision={updateGateDecision}
            updateWidgetState={updateWidgetState}
            settings={settings}
            usageMetrics={usageMetrics}
            setUsageMetrics={setUsageMetrics}
            auditMode={auditMode}
            onExitAudit={() => setAuditMode(false)}
            onLogout={handleLogout}
            onStartTour={startGuidedTour}
            tourStep={tourStep}
            demoMode={demoMode}
            onToggleDemoMode={toggleDemoMode}
          />

          {/* Floating Onboarding Tour Wizard */}
          {tourStep !== null && (
            <div style={{
              position: 'fixed', bottom: '90px', right: '24px', width: 'min(420px, calc(100vw - 32px))', maxHeight: 'calc(100vh - 120px)', overflowY: 'auto', 
              background: 'linear-gradient(135deg, #1E293B 0%, #0F172A 100%)', 
              border: '2px solid var(--cobalt)', borderRadius: '12px', padding: '22px', 
              color: '#FFF', zIndex: 10000, boxShadow: '0 20px 25px -5px rgba(0,0,0,0.6)',

                <span style={{ fontSize: '10.5px', color: 'var(--cobalt)', fontWeight: 'bold', textTransform: 'uppercase', letterSpacing: '0.06em' }}>
                  Guided Onboarding Tour · Step {tourStep} of 12 (Demo Data Loaded)

                {tourStep === 3 && "This is the Strategic Intake Brief. If you skip any input (like ACV or DMU complexity), the checklist dynamically warns you. When you click 'Draft with AI', if you are in the Sandbox Mode, it generates high-fidelity local templates. Connecting your live API key in Admin Settings enables custom B2B prompt generation."}

              {/* Sample report downloads (generated live from the demo project) */}
              {(tourStep === 11 || tourStep === 12) && demoProject && (
                <div style={{ display: 'flex', gap: '8px', flexWrap: 'wrap', marginBottom: '18px' }}>

                    ⬇ Sample Word Report (.doc)
                  </button>
                  <button
                    onClick={() => generateFullPPTPresentation(demoProject)}
                    style={{ padding: '7px 12px', background: 'var(--amber)', border: 'none', color: '#FFF', borderRadius: '4px', cursor: 'pointer', fontSize: '11.5px', fontWeight: '700' }}>

                  </button>

              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                <button 
                  onClick={() => setTourStep(null)} 
                  style={{ background: 'none', border: 'none', color: '#94A3B8', fontSize: '12px', cursor: 'pointer', fontWeight: 'bold' }}
                >
                  Skip Tour
                </button>
                <div style={{ display: 'flex', gap: '8px', flexWrap: 'wrap', justifyContent: 'flex-end' }}>
                  {tourStep > 1 && (
                    <button 
                      onClick={() => setTourStep(tourStep - 1)} 
                      style={{ padding: '6px 12px', background: '#334155', border: 'none', color: '#FFF', borderRadius: '4px', cursor: 'pointer', fontSize: '12px', fontWeight: '600' }}
                    >

                  {tourStep === 12 && (
                    <button
                      onClick={() => { toggleDemoMode(false); setTourStep(null); }}
                      title="Removes the CardioCloud demo project and sample reports from your workspace. You can re-enable Demo Mode from the Homepage."
                      style={{ padding: '6px 12px', background: 'transparent', border: '1px solid var(--amber)', color: '#FBBF24', borderRadius: '4px', cursor: 'pointer', fontSize: '12px', fontWeight: '700' }}

    /* ================= LOGIN SCREEN COMPONENT ================= */
    function AuthScreen({
      loginMode, setLoginMode, loginPin, setLoginPin, loginPasscode, setLoginPasscode,
      showPasscodeText, setShowPasscodeText, loginError, setLoginError, onUserPinLogin, onAdminLogin
    }) {
      const pinKeyPress = (num) => {
        setLoginError("");
        if (loginPin.length < 4) {
          const nextPin = loginPin + num;
          setLoginPin(nextPin);
          if (nextPin.length === 4) {
            setTimeout(() => onUserPinLogin(nextPin), 200);
          }
        }
      };

      const clearPin = () => {
        setLoginPin("");
      };

      return (
        <div style={{ display: 'flex', height: '100vh', width: '100vw', background: 'linear-gradient(135deg, #0F172A 0%, #1E293B 100%)', alignItems: 'center', justifyContent: 'center', padding: '24px' }}>
          <div className="shadow-modal" style={{ width: '100%', maxWidth: '420px', background: '#FFFFFF', borderRadius: '16px', padding: '36px', display: 'flex', flexDirection: 'column', alignItems: 'center', boxSizing: 'border-box' }}>
            <div style={{ textAlign: 'center', marginBottom: '24px' }}>
              <h1 className="font-display" style={{ fontSize: '24px', fontWeight: '700', color: 'var(--ink)' }}>MarketAI™ Platform</h1>
              <p style={{ fontSize: '13px', color: 'var(--ink-soft)', marginTop: '4px' }}>Enterprise B2B Marketing Intelligence Suite</p>
            </div>

            {/* Login Mode Tabs */}
            <div style={{ display: 'flex', width: '100%', background: '#F1F5F9', borderRadius: '8px', padding: '4px', marginBottom: '28px' }}>
              <button 
                onClick={() => { setLoginMode("user"); setLoginError(""); }}
                style={{ flex: 1, padding: '8px', border: 'none', borderRadius: '6px', fontSize: '13px', fontWeight: '600', cursor: 'pointer', background: loginMode === "user" ? "#FFFFFF" : "transparent", color: loginMode === "user" ? "var(--cobalt)" : "var(--ink-soft)", transition: 'all 0.15s' }}>
                Consultant PIN
              </button>
              <button 
                onClick={() => { setLoginMode("admin"); setLoginError(""); }}
                style={{ flex: 1, padding: '8px', border: 'none', borderRadius: '6px', fontSize: '13px', fontWeight: '600', cursor: 'pointer', background: loginMode === "admin" ? "#FFFFFF" : "transparent", color: loginMode === "admin" ? "var(--cobalt)" : "var(--ink-soft)", transition: 'all 0.15s' }}>
                System Admin
              </button>
            </div>

            {loginError && (
              <div style={{ width: '100%', padding: '10px 14px', background: 'var(--red-soft)', color: 'var(--red)', border: '1px solid #FCA5A5', borderRadius: '6px', fontSize: '13px', marginBottom: '20px', textAlign: 'center' }}>
                {loginError}
              </div>
            )}

            {/* PIN CODE USER AUTHENTICATION SCREEN */}
            {loginMode === "user" ? (
              <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', width: '100%' }}>
                <div style={{ display: 'flex', gap: '16px', marginBottom: '32px' }}>
                  {[...Array(4)].map((_, i) => (
                    <div 
                      key={i} 
                      style={{ width: '14px', height: '14px', borderRadius: '50%', border: '2px solid var(--border)', background: i < loginPin.length ? 'var(--cobalt)' : 'transparent', transition: 'all 0.1s ease' }} 
                    />
                  ))}
                </div>

                {/* Keypad Grid */}
                <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: '16px', width: '240px' }}>
                  {[1, 2, 3, 4, 5, 6, 7, 8, 9].map(n => (
                    <button key={n} className="pin-btn" onClick={() => pinKeyPress(n)}>{n}</button>
                  ))}
                  <button className="pin-btn" onClick={clearPin} style={{ fontSize: '13px', color: 'var(--red)' }}>Clear</button>
                  <button className="pin-btn" onClick={() => pinKeyPress(0)}>0</button>
                  <button className="pin-btn" disabled style={{ opacity: 0.3, cursor: 'default' }}>✔</button>
                </div>

                {/* Available Consultants help card */}
                <div style={{ marginTop: '24px', background: '#F8FAFC', border: '1px solid var(--border)', borderRadius: '6px', padding: '12px 14px', width: '100%', boxSizing: 'border-box', fontSize: '11.5px', lineHeight: 1.4 }}>
                  <strong style={{ color: 'var(--ink)', display: 'block', marginBottom: '4px' }}>💡 How Consultant Login Works:</strong>
                  <span style={{ color: 'var(--ink-soft)' }}>
                    Enter any consultant's 4-digit PIN on the keypad. The system will load their profile name (e.g. "Default Consultant") upon a successful match.
                  </span>
                  <div style={{ marginTop: '8px', borderTop: '1px dashed var(--border)', paddingTop: '6px' }}>
                    <strong style={{ display: 'block', marginBottom: '2px', color: 'var(--cobalt)' }}>Default profiles:</strong>

              <div style={{ width: '100%' }} className="fade-in">

                  style={{ width: '100%', padding: '11px', background: 'var(--cobalt)', border: 'none', borderRadius: '6px', color: '#FFFFFF', fontSize: '14px', fontWeight: '600', cursor: 'pointer', transition: 'all 0.15s' }}>
                  Login to Admin Console
                </button>
              </div>
            )}
          </div>
        </div>
      );
    }

    /* ================= SYSTEM ADMIN CONSOLE ================= */
    function AdminDashboard({ users, projects, settings, setSettings, onAddUser, onToggleUserActive, onDeleteUser, onChangeAdminPasscode, onLogout, onAuditProject, onSwitchToConsultant }) {
      const [adminTab, setAdminTab] = useState("users");
      
      const [newUsrName, setNewUsrName] = useState("");
      const [newUsrPin, setNewUsrPin] = useState("");
      
      const adminAcc = users.find(u => u.role === "admin");
      const [newPass, setNewPass] = useState("");

      const handleResetSettings = () => {
        const defaults = {
          provider: "sandbox",   // No API key required out of the box
          model: "sandbox",
          geminiKey: "",
          claudeKey: "",
          proxyUrl: "",
          useProxy: false
        };
        setSettings(defaults);
        setGeminiResult("");
        setClaudeResult("");
        notify("API Settings cleared and reset to defaults.");
      };

      // Connection Testing states
      const [testingGemini, setTestingGemini] = useState(false);
      const [testingClaude, setTestingClaude] = useState(false);
      const [geminiResult, setGeminiResult] = useState("");
      const [claudeResult, setClaudeResult] = useState("");

      const handleAddUserSubmit = (e) => {
        e.preventDefault();
        if (!newUsrName.trim() || newUsrPin.length !== 4 || isNaN(newUsrPin)) {
          return notify("Provide a valid name and exactly 4-digit numeric PIN.");
        }
        onAddUser(newUsrName.trim(), newUsrPin);
        setNewUsrName("");
        setNewUsrPin("");
        notify("Consultant user added successfully.");
      };

      const handlePassSubmit = (e) => {
        e.preventDefault();
        if (newPass.length < 4) return notify("Passcode must be at least 4 characters.");
        onChangeAdminPasscode(newPass);
        setNewPass("");
        notify("Admin passcode changed successfully.");
      };

      // Test AI API keys integration
      const testGeminiConnection = async () => {
        const trimmedKey = (settings.geminiKey || "").trim();
        if (!trimmedKey) return setGeminiResult("Error: Gemini key is blank.");
        setTestingGemini(true);
        setGeminiResult("Testing connection...");
        try {
          const testModel = settings.model.startsWith("gemini") ? settings.model : DEFAULT_GEMINI_MODEL;
          let url = `https://generativelanguage.googleapis.com/v1beta/models/${testModel}:generateContent?key=${trimmedKey}`;
          let headers = { "Content-Type": "application/json" };
          let body = {
            contents: [{ parts: [{ text: "Hello, reply only with the word 'OK' if you see this." }] }]
          };

          if (settings.useProxy && settings.proxyUrl) {
            url = settings.proxyUrl.trim();
            body = {
              provider: "gemini",
              model: testModel,
              apiKey: trimmedKey,
              prompt: "Hello, reply only with the word 'OK' if you see this.",
              ...body
            };
          }

          const res = await fetch(url, {
            method: "POST",
            headers: headers,
            body: JSON.stringify(body)
          });
          if (!res.ok) {
            throw new Error(`API returned status ${res.status}. Make sure the selected model is supported in your region.`);
          }
          const data = await res.json();
          const responseText = data.candidates?.[0]?.content?.parts?.[0]?.text || data.text || "";
          if (responseText.includes("OK") || responseText.length > 0) {
            setGeminiResult("Success: Connection verified!");
          } else {
            setGeminiResult("Error: Unexpected payload return.");
          }
        } catch (err) {
          setGeminiResult(`Error: ${err.message}`);
        } finally {
          setTestingGemini(false);
        }
      };

      const testClaudeConnection = async () => {
        const trimmedKey = (settings.claudeKey || "").trim();
        if (!trimmedKey) return setClaudeResult("Error: Claude key is blank.");
        setTestingClaude(true);
        setClaudeResult("Testing connection (CORS check)...");
        try {
          const testModel = settings.model.startsWith("claude") ? settings.model : DEFAULT_CLAUDE_MODEL;
          let url = "https://api.anthropic.com/v1/messages";
          let headers = {
            "Content-Type": "application/json",
            "x-api-key": trimmedKey,
            "anthropic-version": "2023-06-01",
            "anthropic-dangerous-direct-browser-access": "true"
          };
          let body = {
            model: testModel,
            max_tokens: 10,
            messages: [{ role: "user", content: "Reply with 'OK'." }]
          };

          if (settings.useProxy && settings.proxyUrl) {
            url = settings.proxyUrl.trim();
            body = {
              provider: "claude",
              model: testModel,
              apiKey: trimmedKey,
              prompt: "Reply with 'OK'.",
              ...body
            };
          }

          const res = await fetch(url, {
            method: "POST",
            headers: headers,
            body: JSON.stringify(body)
          });
          if (!res.ok) {
            throw new Error(`API returned status ${res.status}`);
          }
          const data = await res.json();
          const responseText = data.content?.[0]?.text || data.text || "";
          if (responseText.includes("OK") || responseText.length > 0) {
            setClaudeResult("Success: Connection verified!");
          } else {
            setClaudeResult("Error: Response parsing failed.");
          }
        } catch (err) {
          setClaudeResult(`CORS or Authentication Error: ${err.message}.`);
        } finally {
          setTestingClaude(false);
        }
      };

      const handleExportDB = () => {
        const dbDump = { users, projects, settings };
        const blob = new Blob([JSON.stringify(dbDump, null, 2)], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = `marketai_database_backup_${Date.now()}.json`;
        document.body.appendChild(a);
        a.click();
        a.remove();
        URL.revokeObjectURL(url);
      };

      const handleImportDB = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (event) => {
          try {
            const parsed = JSON.parse(event.target.result);
            if (parsed.users && parsed.projects && parsed.settings) {
              localStorage.setItem("marketai_users", JSON.stringify(parsed.users));
              localStorage.setItem("marketai_projects", JSON.stringify(parsed.projects));
              localStorage.setItem("marketai_settings", JSON.stringify(parsed.settings));
              notify("Database restored successfully! Reloading page.");
              window.location.reload();
            } else {
              notify("Invalid backup file schema.");
            }
          } catch (err) {
            notify("Error parsing backup: " + err.message);
          }

        reader.readAsText(file);

                    </select>

                    {settings.provider === "sandbox" && (
                      <div className="fade-in" style={{ marginTop: '14px', padding: '12px 16px', background: 'var(--green-soft)', color: 'var(--green)', borderRadius: '6px', fontSize: '13px', border: '1px solid rgba(5,150,105,0.2)', display: 'flex', alignItems: 'center', gap: '8px' }}>
                        <span style={{ fontSize: '16px' }}>💡</span>
                        <span><strong>Local Sandbox Active:</strong> The strategy suite will generate strategy briefs locally using brief data without making external API connections.</span>

                    )}
                  </div>

                  {/* Gemini Configuration */}
                  <div style={{ marginBottom: '24px', borderBottom: '1px solid var(--border)', paddingBottom: '20px', background: settings.provider === 'gemini' ? '#F8FAFC' : 'transparent', padding: '16px', borderRadius: '6px' }}>

                      padding: '10px 16px', background: '#F1F5F9', border: '1px solid var(--border)', color: 'var(--ink)', borderRadius: '4px', cursor: 'pointer', fontWeight: '600', display: 'inline-flex', alignItems: 'center', gap: '8px'
                    }}>
                      <Icon name="plus" size={14} color="var(--ink)" />
                      Upload Backup File
                      <input type="file" accept=".json" onChange={handleImportDB} style={{ display: 'none' }} />
                    </label>
                  </div>
                </div>
              </div>
            )}
          </div>
        </div>
      );
    }

    /* ================= CLIENT CONSULTANT WORKSPACE ================= */
    function UserWorkspace({
      currentUser, activeModule, setActiveModule, activeProject, userProjects, collapsedGroups, setCollapsedGroups,
      onCreateProject, onDeleteProject, onSelectProject, updateProjectIntake, updateModuleDraft, updateGateDecision,
      updateWidgetState, settings, usageMetrics, setUsageMetrics, auditMode, onExitAudit, onLogout, onStartTour, tourStep,
      demoMode, onToggleDemoMode
    }) {
      const [showNewProjModal, setShowNewProjModal] = useState(false);
      const [newProjName, setNewProjName] = useState("");
      
      const [aiLoading, setAiLoading] = useState(false);
      const [aiError, setAiError] = useState("");
      const [aiNotice, setAiNotice] = useState("");   // amber info (e.g. sandbox fallback), not an error
      
      const [editMode, setEditMode] = useState(false);
      const [showCopilot, setShowCopilot] = useState(false);
      const [showPrepGuide, setShowPrepGuide] = useState(true);
      const [isMobile, setIsMobile] = useState(window.innerWidth < 768);
      const [sidebarOpen, setSidebarOpen] = useState(false);
      const [bannerCollapsed, setBannerCollapsed] = useState(false);

      useEffect(() => {
        if (activeProject) {
          const filled = [
            activeProject.intake.idea,
            activeProject.intake.industry,
            activeProject.intake.acv,
            activeProject.intake.dmu,
            activeProject.intake.competitors,
            activeProject.intake.goal
          ].filter(Boolean).length;
          
          // Collapse if at least one field is saved; keep expanded only for completely blank briefs
          setBannerCollapsed(filled > 0);
        }
      }, [activeProject ? activeProject.id : null]);

      const missingBriefFields = useMemo(() => {
        if (!activeProject) return [];
        const critical = [
          { key: "idea", name: "Offering Description", impact: "AI SWOT, Positioning, and all drafts will fail" },
          { key: "industry", name: "NAICS Industry classification", impact: "Outbound campaign lists targeting will be generic" },
          { key: "acv", name: "Annual Contract Value (ACV)", impact: "Pricing & Unit Economics won't calculate target tiers" },
          { key: "dmu", name: "Buying-committee (DMU)", impact: "Buyer Persona and Customer Journey won't define target committee roles" },
          { key: "competitors", name: "Known competitors", impact: "Competitor Intelligence and differentiation will lack comparisons" },
          { key: "goal", name: "12-month commercial goal", impact: "Objective mapping and budget sizing will lack numeric targets" }
        ];
        return critical.filter(item => !activeProject.intake[item.key]);
      }, [activeProject]);

      useEffect(() => {
        const handleResize = () => {
          const mobile = window.innerWidth < 768;
          setIsMobile(mobile);
          if (!mobile) setSidebarOpen(false);
        };
        window.addEventListener('resize', handleResize);
        return () => window.removeEventListener('resize', handleResize);
      }, []);

      // Group modules
      const groupedModules = useMemo(() => {
        const acc = {};
        GROUP_ORDER.forEach(g => { acc[g] = []; });
        ALL_MODULES.forEach(m => {
          if (acc[m.group]) acc[m.group].push(m);
        });
        return acc;
      }, []);

      // Per-group progress used for sidebar badges ("N pending") and default collapse rules
      const groupProgress = useMemo(() => {
        const stats = {};
        GROUP_ORDER.forEach(groupName => {
          const list = (groupedModules[groupName] || []).filter(m => !NON_DRAFTABLE_IDS.includes(m.id));
          const pending = activeProject ? list.filter(m => !activeProject.moduleDrafts[m.id]).length : list.length;
          stats[groupName] = { total: list.length, pending, complete: list.length > 0 && pending === 0 };
        });
        return stats;
      }, [activeProject, groupedModules]);

      // Default collapse behaviour when a project is opened or resumed:
      // every group starts collapsed, except the group containing the next unfilled
      // module (the "resume point"). Pending counts stay visible on collapsed headers,
      // so nothing gets lost — the sidebar just stays compact.
      useEffect(() => {
        if (activeProject && Object.keys(groupedModules).length > 0) {
          // Find the first draftable module without a saved draft (in module order)
          const nextUnfilled = DRAFTABLE_MODULES.find(m => !activeProject.moduleDrafts[m.id]);
          let focusGroup = nextUnfilled ? nextUnfilled.group : null;

          // While the guided tour runs, follow the tour instead of the resume point
          if (tourStep !== null && TOUR_MODULE_MAP[tourStep] !== undefined) {
            const tourModule = ALL_MODULES.find(m => m.id === TOUR_MODULE_MAP[tourStep]);
            focusGroup = tourModule ? tourModule.group : focusGroup;
          }

          const newCollapsed = {};
          GROUP_ORDER.forEach(groupName => {
            newCollapsed[groupName] = groupName !== focusGroup;
          });
          setCollapsedGroups(newCollapsed);
        }
      }, [activeProject ? activeProject.id : null, tourStep, groupedModules]);

      const activeModuleObj = useMemo(() => {
        return ALL_MODULES.find(m => m.id === activeModule) || ALL_MODULES[0];
      }, [activeModule]);

      // Report readiness: every draftable module has a saved draft
      const reportReady = useMemo(() => {
        if (!activeProject) return false;
        return DRAFTABLE_MODULES.every(m => !!activeProject.moduleDrafts[m.id]);
      }, [activeProject]);

      // Announce readiness once per project (persisted so it doesn't repeat every visit)
      useEffect(() => {
        if (!activeProject || !reportReady) return;
        const flag = "marketai_report_ready_" + activeProject.id;
        if (!localStorage.getItem(flag)) {
          localStorage.setItem(flag, "1");
          notify("🎉 Strategy complete! Your Executive Report is ready — download the Word report or PowerPoint deck from Module 33 (Report Compiler) or the Executive Dashboard.");
        }
      }, [reportReady, activeProject ? activeProject.id : null]);

      // Calculate progress stats
      const completionStats = useMemo(() => {
        if (!activeProject) return { percent: 0, completedCount: 0 };
        const draftedCount = DRAFTABLE_MODULES.filter(m => !!activeProject.moduleDrafts[m.id]).length;
        const totalMod = DRAFTABLE_MODULES.length;
        return {
          percent: Math.round((draftedCount / totalMod) * 100),
          completedCount: draftedCount
        };
      }, [activeProject]);

      // Local Mock Sandbox Strategy Engine
      const generateMockSandboxDraft = (moduleId, project) => {
        const name = project.name || "CardioCloud IoT";
        const idea = project.intake.idea || "Remote patient monitoring telemetry platform";
        const industry = project.intake.industry || "Healthcare & Medical Devices (NAICS 339112)";
        const acv = project.intake.acv || "$50,000 - $100,000";
        const competitors = project.intake.competitors || "BioTelemetry, iRhythm";
        
        if (moduleId === 11) { // SWOT
          return `### SWOT Analysis Matrix for ${name}
          
**Strengths (Internal Capabilities):**
*   **Proactive Real-Time Warnings:** Automatic clinical alerts prevent event deterioration.
*   **Low Friction Setup:** Clinically validated hardware with 94% patient compliance rates.
*   **Out-of-the-Box EHR Integrations:** Direct hooks for Epic and Cerner systems.

**Weaknesses (Internal Challenges):**
*   **High Initial Unit Acquisition Costs:** Hospital procurement requires capital or monthly lease approval.
*   **Clinical Evaluation Resistance:** High customer-acquisition costs (CAC) due to complex clinical trials.
*   **Integration Support Burden:** Tailored clinic setups stretch engineering capacity.

**Opportunities (External Factors):**
*   **CMS Code Incentives:** Medicare guidelines offer monthly remote monitoring fee billing codes ($120/patient/month).
*   **Primary Care NAICS Expansion:** Growth into local clinics under NAICS 621110.
*   **Data Brokerage Partnerships:** Aggregating anonymized patient telemetry for clinical study licenses.

**Threats (External Competitors & Regulations):**
*   **Market Consolidation:** Consolidation of GPOs blocks direct bidding pathways.
*   **Incumbent Defense:** Heavy marketing budgets from legacy telemetry incumbents (${competitors}).
*   **FDA Classification Tightening:** Pending shifts in FDA digital wellness classifications.`;
        }

        if (moduleId === 9) { // PESTLE
          return `### PESTLE Strategic Assessment for ${name}
          
*   **Political:** CMS and state Medicaid rules promote outpatient monitoring models to reduce ER readmission rates.
*   **Economic:** Hospital margins are under pressure, demanding platforms that demonstrate clear cost-containment or new billable revenue models.
*   **Social:** Clinicians suffer from record burnout; automation and passive patient monitoring lower overhead.
*   **Technological:** Mobile telemetry standards and cellular IoT chips allow coverage without home Wi-Fi dependencies.
*   **Environmental:** Reducing patient transport footprints lowers clinical carbon scores.
*   **Legal:** Heavy HIPAA, SOC2, and data encryption mandates.`;
        }

        if (moduleId === 3) { // Customer Research
          return `### Decision Making Unit (DMU) Assessment: ${name}
          
1.  **Economic Buyer (e.g. Chief Medical Officer / VP of Care Coordination):**
    *   *Primary Drivers:* Reduce average length of stay (ALOS) and clinical readmissions. Achieve CMS reimbursement profitability.
    *   *Objections:* Lack of budget code allocation, unproven cost-offset models.
    
2.  **Technical Evaluator (e.g. Hospital IT Director / Security Officer):**
    *   *Primary Drivers:* Secure data transmission protocols (TLS 1.3), SOC2 Type II status, and compatibility with local EHRs.
    *   *Objections:* Data leaks, custom API engineering overhead, lack of Active Directory/SSO support.
    
3.  **End User Champion (e.g. Cardiologists / Head Nurse Practitioner):**
    *   *Primary Drivers:* Intuitive clinic dashboards, fewer false alarms, faster patient onboarding.
    *   *Objections:* Alert fatigue, interface clutter, patient training overhead.`;
        }

        return `### Strategic Framework Draft: ${name}
        
**Overview:**
This is an automated **Demo Sandbox Strategy Draft** generated locally for **Module ${moduleId}** targeting the B2B **${industry}** market vertical.

**1. Tactical Sizing Alignment:**
*   Optimize outbound segmentation parameters targeting accounts with an estimated Annual Contract Value (ACV) of **${acv}**.
*   Align content assets with standard NAICS buyer behaviors.

**2. Product Positioning Heuristics:**
*   Emphasize the core value proposition of **${idea}** in all landing page and sales pitch assets.
*   Deploy differentiation battlecards highlighting superiority over standard competitors (**${competitors}**).

**3. Next Step Verification:**
*   Conduct localized stakeholder interviews to gather validation feedback.
*   Log gate approvals and compile findings into the final report.`;
      };

      // AI prompt orchestrator
      const triggerAIDraft = async () => {
        if (!activeProject) { setAiError("Select or create a project first."); return; }
        if (!activeProject.intake.idea) { setAiError("Please describe your offering in the Intake Brief (Module 2) before drafting — the AI needs it as context."); return; }
        
        setAiLoading(true);
        setAiError("");
        setAiNotice("");

        // Missing-key fallback: a live provider without a key silently uses the
        // Offline Sandbox instead of failing, and the draft is labelled as such.
        const liveKey = settings.provider === "gemini" ? (settings.geminiKey || "").trim()
                      : settings.provider === "claude" ? (settings.claudeKey || "").trim() : "";
        const keylessFallback = (settings.provider === "gemini" || settings.provider === "claude") && !liveKey;
        const effProvider = keylessFallback ? "sandbox" : settings.provider;

        try {
          let context = `BUSINESS BRIEF:\n`;
          INTAKE_FIELDS.forEach(f => {
            if (activeProject.intake[f.key]) {
              context += `- ${f.label}: ${activeProject.intake[f.key]}\n`;
            }
          });

          context += `\nPRIOR COMPLETED STRATEGY MODULES:\n`;
          ALL_MODULES.forEach(m => {
            if (m.id < activeModuleObj.id && activeProject.moduleDrafts[m.id]) {
              context += `--- Module ${m.id}: ${m.name} ---\n${activeProject.moduleDrafts[m.id].slice(0, 850)}\n\n`;
            }
          });

          const prompt = `You are a B2B Marketing Strategy architect. Produce Module ${activeModuleObj.id} - ${activeModuleObj.name} for the following business.
          
${context}

Focus specifically on the objectives of the "${activeModuleObj.name}" module. 
Ensure you write from a professional marketer's point of view, using standard metrics (MQL, SQL, SAL, CAC, LTV) and references to NAICS/SIC industry classifications if B2B outbound lists are involved.
Return ONLY clean Markdown formatting (with headings, lists, bold text). Keep output concise under 650 words. Do not include any code block wraps or conversational greetings.`;

          let responseText = "";
          let inputTokens = 0;
          let outputTokens = 0;

          if (effProvider === "gemini") {
            const trimmedKey = liveKey;
            
            let url = `https://generativelanguage.googleapis.com/v1beta/models/${settings.model}:generateContent?key=${trimmedKey}`;
            let headers = { "Content-Type": "application/json" };
            let body = {
              contents: [{ parts: [{ text: prompt }] }],
              generationConfig: { maxOutputTokens: 1000 }
            };

            if (settings.useProxy && settings.proxyUrl) {
              url = settings.proxyUrl.trim();
              body = {
                provider: "gemini",
                model: settings.model,
                apiKey: trimmedKey,
                prompt: prompt,
                ...body
              };
            }

            const res = await fetch(url, {
              method: "POST",
              headers: headers,
              body: JSON.stringify(body)
            });
            if (!res.ok) throw new Error(`Gemini API call failed with status code ${res.status}`);
            const data = await res.json();
            responseText = data.candidates?.[0]?.content?.parts?.[0]?.text || data.text || "";
            inputTokens = Math.round(prompt.length / 4);
            outputTokens = Math.round(responseText.length / 4);
          } else if (effProvider === "claude") {
            const trimmedKey = liveKey;
            
            let url = "https://api.anthropic.com/v1/messages";
            let headers = {
              "Content-Type": "application/json",
              "x-api-key": trimmedKey,
              "anthropic-version": "2023-06-01",
              "anthropic-dangerous-direct-browser-access": "true"
            };
            let body = {
              model: settings.model.startsWith("claude") ? settings.model : DEFAULT_CLAUDE_MODEL,
              max_tokens: 1000,
              messages: [{ role: "user", content: prompt }]
            };

            if (settings.useProxy && settings.proxyUrl) {
              url = settings.proxyUrl.trim();
              body = {
                provider: "claude",
                model: settings.model,
                apiKey: trimmedKey,
                prompt: prompt,
                ...body
              };
            }

            const res = await fetch(url, {
              method: "POST",
              headers: headers,
              body: JSON.stringify(body)
            });
            if (!res.ok) throw new Error(`Claude API call failed with status code ${res.status}`);
            const data = await res.json();
            responseText = data.content?.[0]?.text || data.text || "";
            inputTokens = data.usage?.input_tokens || Math.round(prompt.length / 4);
            outputTokens = data.usage?.output_tokens || Math.round(responseText.length / 4);
          } else {
            // Offline Sandbox: local template generation, no API connection
            await new Promise(resolve => setTimeout(resolve, 850)); // simulate brief network latency
            responseText = generateMockSandboxDraft(activeModuleObj.id, activeProject);
            inputTokens = 0;   // sandbox is free: keep the session cost ticker honest
            outputTokens = 0;
          }

          if (!responseText) throw new Error("API returned an empty text payload.");

          updateModuleDraft(activeModuleObj.id, responseText);
          setUsageMetrics(prev => ({
            inTokens: prev.inTokens + inputTokens,
            outTokens: prev.outTokens + outputTokens,
            callsCount: prev.callsCount + 1
          }));
          setEditMode(false);
          if (effProvider === "sandbox") {
            setAiNotice(keylessFallback
              ? "This draft was generated by the free Offline Sandbox because no API key is saved for your selected provider. It is a locally generated template — no API key is ever required to use the platform. For live, bespoke AI strategy, add a Gemini or Claude key in the Admin console (Sign Out → Admin login → Configuration)."
              : "Generated by the free Offline Sandbox (no API key required). This is a locally generated template draft — edit it freely, or connect a Gemini/Claude key in the Admin console for live, bespoke AI output.");
          }
        } catch (err) {
          setAiError(err.message || "Network request failed. Verify keys and CORS configurations.");
        } finally {
          setAiLoading(false);
        }
      };

      return (
        <div style={{ display: 'flex', height: '100vh', width: '100vw', overflow: 'hidden', position: 'relative' }}>
          
          {/* Mobile Overlay Backdrop */}
          {isMobile && sidebarOpen && (
            <div 
              onClick={() => setSidebarOpen(false)} 
              style={{ position: 'fixed', inset: 0, background: 'rgba(15,23,42,0.4)', zIndex: 40, transition: 'opacity 0.3s ease' }} 
            />
          )}

          {/* Collapsible Sidebar */}
          <div style={{ 
            width: '272px', 
            minWidth: '272px', 
            background: 'var(--rail-bg)', 
            display: 'flex', 
            flexDirection: 'column', 
            color: '#FFFFFF',
            position: isMobile ? 'fixed' : 'relative',
            top: 0,
            bottom: 0,
            left: 0,
            zIndex: isMobile ? 50 : 'auto',
            transform: isMobile ? (sidebarOpen ? 'translateX(0)' : 'translateX(-100%)') : 'none',
            transition: 'transform 0.3s ease-in-out',
            boxShadow: isMobile && sidebarOpen ? '4px 0 24px rgba(15,23,42,0.5)' : 'none'
          }}>
            <div style={{ padding: '20px', borderBottom: '1px solid rgba(255,255,255,0.08)' }}>
              <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
                <span onClick={() => { setActiveModule("home"); if (isMobile) setSidebarOpen(false); }} className="font-display" style={{ fontSize: '18px', fontWeight: '700', cursor: 'pointer' }}>MarketAI™</span>
                {isMobile ? (
                  <button 
                    onClick={() => setSidebarOpen(false)}
                    style={{ background: 'none', border: 'none', color: '#FFF', cursor: 'pointer', padding: '4px' }}
                  >
                    <Icon name="cross" size={18} />
                  </button>
                ) : auditMode && (
                  <span className="font-mono" style={{ background: 'var(--amber)', color: '#FFF', fontSize: '9px', fontWeight: '600', padding: '2px 6px', borderRadius: '4px', letterSpacing: '0.05em' }}>AUDIT MODE</span>
                )}
              </div>
              
              {/* Project selector */}
              <div style={{ marginTop: '12px', display: 'flex', gap: '8px' }}>
                <select 
                  value={activeProject ? activeProject.id : ""}
                  onChange={e => onSelectProject(e.target.value)}
                  style={{ flex: 1, padding: '6px 8px', fontSize: '12.5px', background: 'rgba(255,255,255,0.1)', color: '#FFF', border: 'none', borderRadius: '4px' }}>
                  <option value="" style={{ color: 'var(--ink)' }}>Select Project...</option>
                  {userProjects.map(p => (
                    <option key={p.id} value={p.id} style={{ color: 'var(--ink)' }}>{p.name}</option>
                  ))}
                </select>
                <button
                  onClick={() => setShowNewProjModal(true)}
                  style={{ padding: '6px 10px', background: 'var(--cobalt)', border: 'none', color: '#FFF', borderRadius: '4px', cursor: 'pointer' }}>
                  +
                </button>
              </div>

              {/* Top Platform Progress Bar */}
              {activeProject && (
                <div style={{ marginTop: '14px' }}>
                  <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: '10.5px', color: 'var(--rail-text)', marginBottom: '4px' }}>
                    <span>Platform Progress</span>
                    <span>{completionStats.percent}%</span>
                  </div>
                  <div style={{ height: '4px', width: '100%', background: 'rgba(255,255,255,0.1)', borderRadius: '2px', overflow: 'hidden' }}>
                    <div style={{ height: '100%', width: `${completionStats.percent}%`, background: 'var(--green)', borderRadius: '2px', transition: 'all 0.3s ease' }} />
                  </div>
                </div>
              )}
            </div>

            {/* Sidebar navigation list */}
            <div style={{ flex: 1, overflowY: 'auto', padding: '12px 0' }}>
              {GROUP_ORDER.map(groupName => {
                const isCollapsed = !!collapsedGroups[groupName];
                const list = groupedModules[groupName] || [];
                return (
                  <div key={groupName} style={{ marginBottom: '8px' }}>
                    <button
                      onClick={() => setCollapsedGroups({ ...collapsedGroups, [groupName]: !isCollapsed })}
                      style={{
                        width: '100%', padding: '6px 20px', background: 'transparent', border: 'none', color: 'rgba(255,255,255,0.4)', textAlign: 'left', fontSize: '11px', fontWeight: '700', letterSpacing: '0.08em', textTransform: 'uppercase', display: 'flex', alignItems: 'center', justifyContent: 'space-between', cursor: 'pointer'
                      }}>
                      <span style={{ overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{groupName}</span>
                      <span style={{ display: 'flex', alignItems: 'center', gap: '6px', flexShrink: 0 }}>
                        {activeProject && reportReady && groupName === "System & Reporting Tools" && (
                          <span title="All strategy modules are drafted — the Executive Report is ready to download in Module 33" style={{ fontSize: '9px', background: 'rgba(5,150,105,0.18)', color: '#34D399', padding: '1px 6px', borderRadius: '8px', fontWeight: '800', letterSpacing: 0 }}>⬇ Report Ready</span>
                        )}
                        {activeProject && groupProgress[groupName] && groupProgress[groupName].total > 0 && (
                          groupProgress[groupName].complete ? (
                            <span title="All modules in this group are drafted" style={{ fontSize: '9px', background: 'rgba(5,150,105,0.18)', color: '#34D399', padding: '1px 6px', borderRadius: '8px', fontWeight: '800', letterSpacing: 0 }}>✓ Done</span>
                          ) : (
                            <span title={`${groupProgress[groupName].pending} of ${groupProgress[groupName].total} modules still need a draft`} style={{ fontSize: '9px', background: 'rgba(217,119,6,0.18)', color: '#FBBF24', padding: '1px 6px', borderRadius: '8px', fontWeight: '800', letterSpacing: 0 }}>{groupProgress[groupName].pending} pending</span>
                          )
                        )}
                        <span style={{ fontSize: '9px', transform: isCollapsed ? 'rotate(-90deg)' : 'none', transition: 'all 0.15s' }}>▼</span>
                      </span>
                    </button>
                    
                    {!isCollapsed && (
                      <div style={{ marginTop: '4px' }} className="fade-in">
                        {list.map(m => {
                          const isDrafted = activeProject && !!activeProject.moduleDrafts[m.id];
                          const isActive = activeModule === m.id;
                          const reqs = MODULE_REQUIREMENTS[m.id];
                          const isMissingDeps = activeProject && reqs && reqs.keys.some(k => !activeProject.intake[k]);

                          return (
                            <button
                              key={m.id}
                              onClick={() => {
                                setActiveModule(m.id);
                                if (isMobile) setSidebarOpen(false);
                              }}
                              title={isMissingDeps ? `${reqs.label} (Checklist Input Missing)` : ""}
                              style={{
                                width: '100%', display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '7px 20px 7px 24px', border: 'none', 
                                background: isActive ? 'var(--rail-hover)' : 'transparent', 
                                color: isActive ? '#FFFFFF' : (isMissingDeps ? '#FBBF24' : (m.isInput ? '#60A5FA' : 'var(--rail-text)')), 
                                cursor: 'pointer', textAlign: 'left', fontSize: '12.5px', transition: 'all 0.15s'
                              }}>
                              <span style={{ display: 'flex', alignItems: 'center', gap: '8px', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>
                                <span style={{ 
                                  opacity: isMissingDeps ? 1 : 0.6, 
                                  fontSize: '11px', 
                                  color: isMissingDeps ? 'var(--amber)' : (m.isInput ? '#60A5FA' : 'inherit'), 
                                  fontWeight: (isMissingDeps || m.isInput) ? 'bold' : 'normal' 
                                }}>
                                  {isMissingDeps ? "⚠️" : m.id}
                                </span>
                                <span style={{ overflow: 'hidden', textOverflow: 'ellipsis', color: isMissingDeps ? '#FBBF24' : 'inherit', display: 'flex', alignItems: 'center', gap: '6px' }}>
                                  {m.name}
                                  {m.isInput && (
                                    <span style={{ fontSize: '8.5px', background: 'rgba(59,130,246,0.15)', color: '#93C5FD', padding: '1px 4px', borderRadius: '3px', fontWeight: '800', border: '1px solid rgba(59,130,246,0.2)' }}>
                                      INPUT
                                    </span>
                                  )}
                                </span>
                              </span>
                              {m.id === 33 && reportReady && (
                                <span title="Your full strategy report is ready to download here" style={{ fontSize: '9px', color: '#34D399', fontWeight: '800', flexShrink: 0 }} className="pulse-glow">⬇ Ready</span>
                              )}
                              {isDrafted && !isMissingDeps && (
                                <Icon name="check" size={11} color="var(--green)" />
                              )}
                              {!isDrafted && !isMissingDeps && !NON_DRAFTABLE_IDS.includes(m.id) && (
                                <span title="No AI draft saved for this module yet" style={{ fontSize: '9px', color: '#FBBF24', fontWeight: '700', display: 'inline-flex', alignItems: 'center', gap: '4px', flexShrink: 0 }}>

                                  Pending

    /* ================= DECISION GATE COMPONENT ================= */
    function GateWidget({ gate, project, updateGateDecision, auditMode }) {
      const decision = project.gateDecisions[gate.id] || { passed: false, note: "" };
      const [note, setNote] = useState(decision.note);

      useEffect(() => {
        setNote(decision.note);
      }, [decision.note]);

      const handleConfirm = () => {
        updateGateDecision(gate.id, true, note);
        notify("Decision Gate verified and enrolled in the SOSTAC board documentation.");
      };

      const handleReopen = () => {
        updateGateDecision(gate.id, false, note);
      };

      return (
        <div style={{ background: 'var(--amber-soft)', borderRadius: '8px', border: '1px solid var(--amber)', borderLeft: '5px solid var(--amber)', padding: '24px', marginBottom: '40px' }}>
          <h4 className="font-display" style={{ color: 'var(--amber)', fontSize: '16px', fontWeight: '700' }}>
            {gate.label}
          </h4>
          <p style={{ fontSize: '13.5px', marginTop: '6px', lineHeight: 1.5 }}>{gate.question}</p>
          
          <div style={{ marginTop: '16px' }}>
            <label style={{ display: 'block', fontSize: '12px', fontWeight: '700', marginBottom: '6px', color: 'var(--ink)' }}>Decision Note / Assumptions Logged</label>
            <textarea
              rows={2}
              value={note}
              onChange={e => setNote(e.target.value)}
              disabled={decision.passed || auditMode}
              placeholder="Record the logic behind passing this gate (e.g., Attractiveness score is high based on verified market sizing)."
            />
          </div>

          <div style={{ display: 'flex', gap: '8px', marginTop: '14px', alignItems: 'center' }}>
            {!decision.passed ? (
              <button
                onClick={handleConfirm}
                disabled={auditMode}
                style={{ padding: '8px 16px', background: 'var(--amber)', color: '#FFF', border: 'none', borderRadius: '4px', cursor: 'pointer', fontWeight: '600', fontSize: '13px' }}>
                Confirm & Pass Gate
              </button>
            ) : (
              <>
                <span style={{ 
                  display: 'inline-flex', alignItems: 'center', gap: '6px', fontSize: '12px', fontWeight: '700',
                  color: 'var(--green)', background: 'var(--green-soft)', padding: '4px 10px', borderRadius: '12px'
                }}>
                  ✔ GATE PASSED
                </span>
                <button
                  onClick={handleReopen}
                  disabled={auditMode}
                  style={{ padding: '4px 8px', border: '1px solid var(--border)', background: '#FFF', borderRadius: '4px', cursor: 'pointer', fontSize: '12px' }}>
                  Reopen Gate
                </button>
              </>
            )}
          </div>
        </div>
      );
    }

    /* ================= FLOATING AI COPILOT CHAT ================= */
    function CopilotWidget({ visible, setVisible, activeModuleObj, activeProject, settings, usageMetrics, setUsageMetrics, auditMode, setActiveModule }) {
      const [messages, setMessages] = useState([]);
      const [query, setQuery] = useState("");
      const [thinking, setThinking] = useState(false);
      const chatEndRef = useRef(null);

      const missingFields = useMemo(() => {
        if (!activeProject) return [];
        const list = [];
        if (!activeProject.intake.idea) list.push({ name: "Offering Description", key: "idea", impact: "SWOT, Positioning, and all AI drafts will fail" });
        if (!activeProject.intake.industry) list.push({ name: "Target Industry & NAICS", key: "industry", impact: "Module 22 & 25 campaigns won't have NAICS filters" });
        if (!activeProject.intake.acv) list.push({ name: "Annual Contract Value (ACV)", key: "acv", impact: "Pricing & Unit Economics won't align" });
        if (!activeProject.intake.dmu) list.push({ name: "Buying-committee (DMU)", key: "dmu", impact: "Buyer Persona & Customer Journey won't define roles" });
        if (!activeProject.intake.competitors) list.push({ name: "Known competitors", key: "competitors", impact: "Competitors and differentiation will lack comparisons" });
        if (!activeProject.intake.goal) list.push({ name: "12-month commercial goal", key: "goal", impact: "Objectives and budget sizing will lack targets" });

      }, [activeProject]);

      const suggestions = useMemo(() => {
        const defaults = ["What are the core frameworks used here?", "Explain how to verify this gate.", "How is TAM calculated?"];
        if (activeModuleObj.id === 2) return ["How detailed does the brief need to be?", "Can I modify my brief answers?", "What is Annual Contract Value (ACV)?"];
        if (activeModuleObj.id === 4) return ["What is the formula for SAM?", "How do I estimate Annual Contract Value (ACV)?", "Where do I log TAM assumptions?"];
        if (activeModuleObj.id === 10) return ["Explain Buyer Power simply.", "What are Substitutes in B2B?", "How do I score Supplier Power?"];
        return defaults;
      }, [activeModuleObj.id]);

      useEffect(() => {
        if (chatEndRef.current) {
          chatEndRef.current.scrollIntoView({ behavior: 'smooth' });
        }
      }, [messages, thinking, visible]);

      const handleSend = async (txtStr) => {
        const textToSend = txtStr || query;
        if (!textToSend.trim() || thinking) return;
        
        setQuery("");
        const newMsgs = [...messages, { role: "user", text: textToSend }];
        setMessages(newMsgs);
        setThinking(true);

        try {
          if (!activeProject) throw new Error("Please select a project context.");
          
          let responseText = "";
          let inputTokens = 0;
          let outputTokens = 0;

          const progressInfo = `Active Module: Module ${activeModuleObj.id} - ${activeModuleObj.name}.\nBrief idea: ${activeProject.intake.idea || "not filled"}.\n`;
          const historyText = newMsgs.slice(-5).map(m => `${m.role === "user" ? "User" : "Assistant"}: ${m.text}`).join("\n");
          
          const systemPrompt = `You are the Strategy Copilot inside the B2B Marketing Intelligence Platform. Renders brief senior consultant answers. Keep responses under 130 words in Markdown. Do not include signatures or filler.
          
CONTEXT:
${progressInfo}

CONVERSATION:
${historyText}`;

          const copilotKeyless = settings.provider === "sandbox"
            || (settings.provider === "gemini" && !(settings.geminiKey || "").trim())
            || (settings.provider === "claude" && !(settings.claudeKey || "").trim());

          if (copilotKeyless) {
            // Offline Sandbox responder: helpful local guidance, no API needed
            await new Promise(r => setTimeout(r, 550));
            const missingNote = missingFields.length > 0
              ? `\n\n⚠️ Your brief is missing **${missingFields.length} critical input${missingFields.length > 1 ? "s" : ""}** (${missingFields.map(f => f.name).join(", ")}) — completing the **Strategic Intake Brief (Module 2)** sharpens every module.`
              : `\n\n✅ Your Strategic Intake Brief (Module 2) has all 6 critical inputs — every module can draft at full depth.`;
            responseText = `**Offline Sandbox Copilot** (no API key required)\n\nYou asked: *"${textToSend.slice(0, 120)}"*\n\nYou are on **Module ${activeModuleObj.id} — ${activeModuleObj.name}**: ${activeModuleObj.desc}${missingNote}\n\nThe Sandbox gives free template drafts and this guidance. For live, question-specific AI answers, add a Gemini or Claude API key in the Admin console (Sign Out → Admin login → Configuration) — it is optional, never required.`;
            inputTokens = 0;
            outputTokens = 0;
          } else if (settings.provider === "gemini") {
            let url = `https://generativelanguage.googleapis.com/v1beta/models/${settings.model}:generateContent?key=${settings.geminiKey}`;
            let headers = { "Content-Type": "application/json" };
            let body = { contents: [{ parts: [{ text: systemPrompt }] }] };

            if (settings.useProxy && settings.proxyUrl) {
              url = settings.proxyUrl.trim();
              body = {
                provider: "gemini",
                model: settings.model,
                apiKey: settings.geminiKey,
                prompt: systemPrompt,
                ...body
              };
            }

            const res = await fetch(url, {
              method: "POST",
              headers: headers,
              body: JSON.stringify(body)
            });
            if (!res.ok) throw new Error(`Gemini call failed: status ${res.status}`);
            const data = await res.json();
            responseText = data.candidates?.[0]?.content?.parts?.[0]?.text || data.text || "";
            inputTokens = Math.round(systemPrompt.length / 4);
            outputTokens = Math.round(responseText.length / 4);
          } else {
            let url = "https://api.anthropic.com/v1/messages";
            let headers = {
              "Content-Type": "application/json",
              "x-api-key": settings.claudeKey,
              "anthropic-version": "2023-06-01",
              "anthropic-dangerous-direct-browser-access": "true"
            };
            let body = {
              model: DEFAULT_CLAUDE_MODEL,
              max_tokens: 1000,
              messages: [{ role: "user", content: systemPrompt }]
            };

            if (settings.useProxy && settings.proxyUrl) {
              url = settings.proxyUrl.trim();
              body = {
                provider: "claude",
                model: DEFAULT_CLAUDE_MODEL,
                apiKey: settings.claudeKey,
                prompt: systemPrompt,
                ...body
              };
            }

            const res = await fetch(url, {
              method: "POST",
              headers: headers,
              body: JSON.stringify(body)
            });
            if (!res.ok) throw new Error(`Claude call failed: status ${res.status}`);
            const data = await res.json();
            responseText = data.content?.[0]?.text || data.text || "";
            inputTokens = data.usage?.input_tokens || Math.round(systemPrompt.length / 4);
            outputTokens = data.usage?.output_tokens || Math.round(responseText.length / 4);
          }

          setMessages(prev => [...prev, { role: "assistant", text: responseText }]);
          setUsageMetrics(prev => ({
            inTokens: prev.inTokens + inputTokens,
            outTokens: prev.outTokens + outputTokens,
            callsCount: prev.callsCount + 1
          }));
        } catch (err) {
          setMessages(prev => [...prev, { role: "assistant", text: `Error: ${err.message}` }]);
        } finally {
          setThinking(false);
        }
      };

      if (!visible) {

            {missingFields.length > 0 && (
              <div style={{ background: 'var(--amber-soft)', border: '1px solid rgba(217,119,6,0.15)', borderRadius: '8px', padding: '10px 12px', marginBottom: '14px', fontSize: '11.5px', lineHeight: 1.4 }} className="fade-in">

                <ul style={{ paddingLeft: '14px', margin: '4px 0', color: 'var(--ink)' }}>

                  👉 Read the full <a href="#34" onClick={(e) => { e.preventDefault(); setVisible(false); setActiveModule(34); }} style={{ color: 'var(--cobalt)', textDecoration: 'underline' }}>Marketer's Prerequisites Guide in Module 34</a>.
                </div>
              </div>
            )}
            
            {messages.length === 0 && (
              <p style={{ fontSize: '12.5px', color: 'var(--ink-soft)', lineHeight: 1.5 }}>
                You are currently viewing <strong style={{ color: 'var(--ink)' }}>{activeModuleObj.name}</strong>. Ask me any framework questions or strategy feedback.

            {messages.map((m, idx) => (

                <div style={{

                  background: m.role === "user" ? 'var(--cobalt)' : '#FFF',
                  color: m.role === "user" ? '#FFF' : 'var(--ink)',
                  border: m.role === "user" ? 'none' : '1px solid var(--border)'

              </div>
            ))}
            {thinking && (
              <span className="font-mono" style={{ fontSize: '11px', color: 'var(--ink-soft)' }}>Copilot is researching...</span>
            )}
            <div ref={chatEndRef} />
          </div>

          <div style={{ display: 'flex', gap: '6px', flexWrap: 'wrap', padding: '8px 12px', background: '#FFF', borderTop: '1px solid var(--border)' }}>
            {suggestions.map((s, i) => (
              <button
                key={i}

              </button>
            ))}
          </div>

          <div style={{ display: 'flex', gap: '8px', padding: '12px', background: '#FFF' }}>
            <input

          </div>
        </div>

    // TAM SAM SOM Calculator Widget
    function TamCalculatorWidget({ state, onUpdate }) {
      const formatCurrency = (val) => "$" + val.toLocaleString();

      const calculated = useMemo(() => {
        const tam = state.tamAccts * state.acvVal;
        const sam = state.samAccts * state.acvVal;
        const som = state.somAccts * state.acvVal;
        return { tam, sam, som };
      }, [state]);

      const changeField = (key, val) => {
        onUpdate({ ...state, [key]: Number(val) });
      };

      const handleDownloadSVG = () => {
        const svgContent = `
          <svg xmlns="http://www.w3.org/2000/svg" width="600" height="300" viewBox="0 0 600 300" style="background:#FFFFFF; font-family:sans-serif; padding:20px;">
            <rect width="100%" height="100%" fill="#FFFFFF"/>
            <text x="30" y="40" font-size="18" font-weight="bold" fill="#0F172A">Market Sizing Slices (TAM / SAM / SOM)</text>
            <text x="30" y="60" font-size="12" fill="#64748B">Average Annual Contract Value (ACV) = ${formatCurrency(state.acvVal)}</text>
            
            <!-- TAM -->
            <text x="30" y="110" font-size="12" font-weight="bold" fill="#0F172A">TAM (${state.tamAccts} accounts): ${formatCurrency(calculated.tam)}</text>
            <rect x="30" y="120" width="540" height="16" rx="4" fill="#2563EB"/>
            
            <!-- SAM -->
            <text x="30" y="175" font-size="12" font-weight="bold" fill="#0F172A">SAM (${state.samAccts} accounts): ${formatCurrency(calculated.sam)}</text>
            <rect x="30" y="185" width="${Math.max(10, 540 * (calculated.sam / calculated.tam))}" height="16" rx="4" fill="#10B981"/>
            
            <!-- SOM -->
            <text x="30" y="240" font-size="12" font-weight="bold" fill="#0F172A">SOM (${state.somAccts} accounts): ${formatCurrency(calculated.som)}</text>
            <rect x="30" y="250" width="${Math.max(10, 540 * (calculated.som / calculated.tam))}" height="16" rx="4" fill="#F59E0B"/>
          </svg>
        `.trim();
        
        const blob = new Blob([svgContent], { type: "image/svg+xml" });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        link.download = `market_sizing_chart.svg`;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        URL.revokeObjectURL(url);

      return (
        <div style={{ display: 'flex', flexDirection: 'column', gap: '20px' }}>

                <input type="number" value={state.tamAccts} onChange={e => changeField("tamAccts", e.target.value)} />
              </div>
              <div>
                <label style={{ display: 'block', fontSize: '11.5px', fontWeight: '700', marginBottom: '4px' }}>SAM Serviced Accounts</label>

            <div style={{ display: 'flex', flexDirection: 'column', justifyContent: 'center', background: '#F8FAFC', border: '1px solid var(--border)', borderRadius: '6px', padding: '20px' }}>

              <div style={{ display: 'flex', flexDirection: 'column', gap: '10px' }}>
                <div>
                  <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: '12px', marginBottom: '3px' }}>
                    <span>Total Addressable Market (TAM)</span>
                    <strong>{formatCurrency(calculated.tam)}</strong>
                  </div>
                  <div style={{ height: '8px', background: 'var(--border)', borderRadius: '4px', overflow: 'hidden' }}>
                    <div style={{ height: '100%', width: '100%', background: 'var(--cobalt)' }} />
