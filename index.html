    }

    // PESTLE Grid Editor Widget
    function PestleGridWidget({ state, onUpdate }) {
      const [inputs, setInputs] = useState({ political: "", economic: "", social: "", tech: "", env: "", legal: "" });

      const handleAdd = (category) => {
        const val = inputs[category].trim();
        if (!val) return;
        const currentList = state[category] || [];
        onUpdate({
          ...state,
          [category]: [...currentList, val]
        });
        setInputs({ ...inputs, [category]: "" });
      };

      const handleRemove = (category, idx) => {
        const filtered = (state[category] || []).filter((_, i) => i !== idx);
        onUpdate({ ...state, [category]: filtered });
      };

      const renderSection = (category, title, colorClass) => {
        const items = state[category] || [];
        return (
          <div style={{ border: '1px solid var(--border)', borderRadius: '6px', padding: '16px', background: '#FFF' }}>
            <h4 style={{ fontWeight: '700', fontSize: '13.5px', marginBottom: '8px', color: colorClass }}>{title}</h4>
            
            <ul style={{ paddingLeft: '16px', fontSize: '12px', marginBottom: '10px' }}>
              {items.map((item, idx) => (
                <li key={idx} style={{ margin: '4px 0', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                  <span>{item}</span>
                  <button 
                    onClick={() => handleRemove(category, idx)} 
                    style={{ background: 'none', border: 'none', color: 'var(--red)', cursor: 'pointer', fontSize: '10px' }}>
                    Remove
                  </button>
                </li>
              ))}
              {items.length === 0 && <span style={{ color: 'var(--ink-soft)', fontStyle: 'italic' }}>No drivers logged.</span>}
            </ul>

            <div style={{ display: 'flex', gap: '6px' }}>
              <input 
                type="text" 
                value={inputs[category]} 
                onChange={e => setInputs({ ...inputs, [category]: e.target.value })}
                placeholder="Add macro driver"
                style={{ padding: '4px 8px', fontSize: '12px' }}
                onKeyDown={e => { if (e.key === "Enter") handleAdd(category); }}
              />
              <button 
                onClick={() => handleAdd(category)}
                style={{ padding: '4px 8px', background: '#F1F5F9', border: '1px solid var(--border)', borderRadius: '4px', cursor: 'pointer', fontSize: '12px' }}>
                Add
              </button>
            </div>
          </div>
        );
      };

      return (
        <div className="pestle-grid">
          {renderSection("political", "Political", "var(--cobalt)")}
          {renderSection("economic", "Economic", "var(--green)")}
          {renderSection("social", "Social", "var(--amber)")}
          {renderSection("tech", "Technological", "var(--cobalt)")}
          {renderSection("env", "Environmental", "var(--green)")}
          {renderSection("legal", "Legal", "var(--red)")}
        </div>
      );
    }

    // Porter Five Forces Scoring Slider Widget
    function PorterSliderWidget({ state, onUpdate }) {
      const changeForce = (forceKey, scoreVal) => {
        onUpdate({ ...state, [forceKey]: Number(scoreVal) });
      };

      const avgRisk = useMemo(() => {
        const sum = state.supplier + state.buyer + state.substitutes + state.entrants + state.rivalry;

      return (
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 300px', gap: '24px' }}>
          <div style={{ display: 'flex', flexDirection: 'column', gap: '14px' }}>

              { key: "rivalry", label: "Competitive Rivalry (ECG sensor hardware brands)" }

                <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: '12.5px', marginBottom: '4px' }}>
                  <span>{f.label}</span>

            ))}

          <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', background: '#F8FAFC', border: '1px solid var(--border)', borderRadius: '6px', padding: '24px', textAlign: 'center' }}>

            <h2 style={{ fontSize: '42px', fontWeight: '700', color: avgRisk >= 3.5 ? 'var(--red)' : avgRisk >= 2.5 ? 'var(--amber)' : 'var(--green)', marginTop: '4px' }}>

            </h2>
            <span style={{ fontSize: '13px', fontWeight: '600', marginTop: '6px' }}>
              {avgRisk >= 3.5 ? "High Risk Landscape" : avgRisk >= 2.5 ? "Moderate Market Pressure" : "High Value Potential"}
            </span>
          </div>
        </div>
      );
    }

    /* ================= DOCUMENT & PRESENTATION GENERATION UTILITIES ================= */

    function convertMdToHtml(md) {
      if (!md) return "";
      let html = md;
      // Headings
      html = html.replace(/^### (.*?)$/gm, "<h3>$1</h3>");
      html = html.replace(/^## (.*?)$/gm, "<h2>$1</h2>");
      html = html.replace(/^# (.*?)$/gm, "<h1>$1</h1>");
      // Bold
      html = html.replace(/\*\*(.*?)\*\*/g, "<strong>$1</strong>");
      // Blockquotes
      html = html.replace(/^> (.*?)$/gm, "<blockquote>$1</blockquote>");
      // Lists
      html = html.replace(/^\- (.*?)$/gm, "<li>$1</li>");
      // Linebreaks
      html = html.replace(/\n/g, "<br/>");
      return html;
    }

    function generateSingleModuleWord(project, m) {
      let htmlContent = `<h1>Module ${m.id}: ${m.name}</h1>
      <h3>Category Group: ${m.group}</h3>
      <hr/>`;

      const draft = project.moduleDrafts[m.id];
      if (draft) {
        htmlContent += `<div>${convertMdToHtml(draft)}</div>`;
      } else {
        htmlContent += `<p style="color: #94A3B8; font-style: italic;">No strategy content drafted for this module yet.</p>`;
      }

      if (m.id === 11) {
        const swot = project.widgetStates?.swot || {};
        htmlContent += `<h4>SWOT Matrix Grid Details</h4>
        <table>
          <tr><td style="background-color: #ECFDF5; width: 50%;"><strong>Strengths:</strong><br/>${(swot.strengths || []).join("<br/>") || "None"}</td>
              <td style="background-color: #FEE2E2; width: 50%;"><strong>Weaknesses:</strong><br/>${(swot.weaknesses || []).join("<br/>") || "None"}</td></tr>
          <tr><td style="background-color: #EFF6FF; width: 50%;"><strong>Opportunities:</strong><br/>${(swot.opportunities || []).join("<br/>") || "None"}</td>
              <td style="background-color: #FEF3C7; width: 50%;"><strong>Threats:</strong><br/>${(swot.threats || []).join("<br/>") || "None"}</td></tr>
        </table>`;
      }

      const gate = GATES.find(g => g.moduleSource === m.id);
      if (gate) {
        const decision = project.gateDecisions[gate.id];
        htmlContent += `<div style="background-color: #F8FAFC; border-left: 4px solid #2563EB; padding: 10px; margin-top: 20px;">
          <strong>Gate Enrollment: ${gate.label}</strong><br/>
          Status: ${decision?.passed ? "PASSED & APPROVED" : "PENDING"}<br/>
          Note: ${decision?.note || "No notes logged."}
        </div>`;
      }

      const header = "<html xmlns:o='urn:schemas-microsoft-com:office:office' "+
        "xmlns:w='urn:schemas-microsoft-com:office:word' "+
        "xmlns='http://www.w3.org/TR/REC-html40'>"+
        "<head><title>Module ${m.id} Report</title><style>"+
        "body { font-family: Arial, sans-serif; line-height: 1.6; color: #334155; }"+
        "h1 { color: #2563EB; font-size: 20pt; font-family: Georgia, serif; }"+
        "h3 { color: #64748B; font-size: 11pt; text-transform: uppercase; margin-bottom: 20pt; }"+
        "h4 { color: #0F172A; font-size: 13pt; margin-top: 14pt; font-weight: bold; }"+
        "p, li { font-size: 11pt; color: #334155; }"+
        "table { width: 100%; border-collapse: collapse; margin-top: 10pt; }"+
        "th, td { border: 1px solid #CBD5E1; padding: 8px; font-size: 10.5pt; text-align: left; }"+
        "</style></head><body>";
      const footer = "</body></html>";
      const fileContent = header + htmlContent + footer;

      const blob = new Blob(['\ufeff' + fileContent], { type: "application/msword" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `module_${m.id}_${m.name.toLowerCase().replace(/\s+/g, "_")}.doc`;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    }

    function generateSingleModulePPT(project, m) {

        return;
      }
      
      const pptx = new window.PptxGenJS();
      pptx.layout = "LAYOUT_16x9";

      sm.addShape(pptx.shapes.RECTANGLE, { x: 0, y: 0, w: "100%", h: 0.8, fill: "0F172A" });
      sm.addText(`Module ${m.id}: ${m.name}`, { x: 0.5, y: 0.2, w: 9.0, h: 0.4, fontSize: 18, color: "FFFFFF", bold: true, fontFace: "Georgia" });

    function ReportCompilerWidget({ project }) {

      const generatedDoc = useMemo(() => {
        const doc = [];

        doc.push("## Business Brief / Intake Inputs");

            doc.push(`- **${f.label}:** ${project.intake[f.key]}`);

        ALL_MODULES.forEach(m => {

          {items.map((it, idx) => (
            <div key={idx} style={{ border: '1px solid var(--border)', borderRadius: '6px', padding: '16px', background: '#FFF' }}>
              <h4 style={{ fontWeight: '700', fontSize: '14px', color: 'var(--cobalt)', marginBottom: '8px' }}>{it.name}</h4>
              <p style={{ fontSize: '13.5px', color: 'var(--ink-soft)', lineHeight: 1.5, marginBottom: it.details ? '10px' : '0' }}>{it.desc}</p>
              {it.details && (
                <div style={{ display: 'flex', flexDirection: 'column', gap: '8px', paddingLeft: '8px', borderLeft: '2px solid var(--border)' }}>
                  {it.details.map((d, dIdx) => (
                    <div key={dIdx} style={{ fontSize: '12.5px', color: 'var(--ink-soft)', lineHeight: 1.4 }}>
                      <Markdown text={d} compact />
                    </div>
                  ))}
                </div>
              )}
            </div>
          ))}
        </div>
      );
    }

    /* ================= BOOTSTRAP RENDER ================= */
    const rootEl = document.getElementById("root");
    const root = ReactDOM.createRoot(rootEl);
    root.render(<App />);
  </script>
</body>
</html>
